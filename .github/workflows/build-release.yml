name: Build & Release

# Builds the Windows .exe and attaches it to a GitHub Release whenever you
# push a version tag like v2.0.0. Also buildable manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write        # needed to create the release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build exe
        run: pyinstaller seedmon.spec

      - name: Verify build
        run: |
          if (-Not (Test-Path "dist/SquadSeedMonitor.exe")) {
            Write-Error "Build failed: exe not found"
            exit 1
          }
          Write-Host "Built dist/SquadSeedMonitor.exe"

      # For tag pushes: publish a release with the exe attached.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SquadSeedMonitor.exe
          generate_release_notes: true

      # For manual runs: just upload the exe as an artifact to download.
      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: SquadSeedMonitor
          path: dist/SquadSeedMonitor.exe
