name: Build & Release

# Builds the Windows .exe and attaches it to a GitHub Release whenever you
# push a version tag like v2.0.0. Also buildable manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write        # needed to create the release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build exe
        run: pyinstaller seedmon.spec

      - name: Verify build
        run: |
          if (-Not (Test-Path "dist/SquadSeedMonitor.exe")) {
            Write-Error "Build failed: exe not found"
            exit 1
          }
          Write-Host "Built dist/SquadSeedMonitor.exe"

      # Build the Windows installer (desktop-shortcut prompt + uninstaller).
      - name: Build installer (Inno Setup)
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\SquadSeedMonitor.iss
          $setup = Get-ChildItem dist\SquadSeedMonitor-Setup-*.exe | Select-Object -First 1
          if (-Not $setup) { Write-Error "Installer not produced"; exit 1 }
          Write-Host "Built $($setup.FullName)"

      # For tag pushes: publish a release with the exe AND installer attached.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SquadSeedMonitor.exe
            dist/SquadSeedMonitor-Setup-*.exe
          generate_release_notes: true

      # For manual runs: upload the exe + installer as artifacts to download.
      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: SquadSeedMonitor
          path: |
            dist/SquadSeedMonitor.exe
            dist/SquadSeedMonitor-Setup-*.exe
